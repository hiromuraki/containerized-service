name: Build and Push OCI Images

on:
    push:
        branches: ["main"]
        paths:
            - "oci-image/**"
            - ".github/workflows/build-oci-images.yml"
    pull_request:
        branches: ["main"]

env:
    # 镜像前缀：ghcr.io/<用户名>
    IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
    # 阶段 0：平台验证，仅在 GitHub 执行镜像构建
    gatekeeper:
        if: github.server_url == 'https://github.com'
        runs-on: ubuntu-latest
        steps:
            - name: Environment Check
              run: echo ""

    # 阶段 1：生成构建矩阵
    prepare-matrix:
        needs: [gatekeeper]
        runs-on: ubuntu-latest
        outputs:
            # 将下一步生成的 JSON 数组暴露给下游 Job
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Detect changed images
              id: set-matrix
              run: |
                  cd oci-image

                  # 获取本次 push/PR 变更的文件列表
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
                  elif git rev-parse HEAD^ >/dev/null 2>&1; then
                      CHANGED=$(git diff --name-only HEAD^ HEAD)
                  else
                      CHANGED=""
                  fi

                  # 工作流文件变更或首次提交 → 构建全部
                  if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -q '^\.github/workflows/'; then
                      DIRS=$(find . -mindepth 1 -maxdepth 1 -type d -exec test -e '{}/Dockerfile' \; -print | sed 's|^\./||' | jq -R -s -c 'split("\n")[:-1]')
                  else
                      DIRS=$(echo "$CHANGED" | grep '^oci-image/' | cut -d/ -f2 | sort -u | while read d; do [ -f "$d/Dockerfile" ] && echo "$d"; done | jq -R -s -c 'split("\n")[:-1]')
                  fi

                  echo "Selected directories: $DIRS"
                  echo "matrix=$DIRS" >> $GITHUB_OUTPUT

    # 阶段 2：使用矩阵并发构建
    build-and-push:
        needs: prepare-matrix
        runs-on: ubuntu-latest
        # 防御性编程：如果没扫描到任何目录，直接跳过，防止报错
        if: ${{ needs.prepare-matrix.outputs.matrix != '[]' && needs.prepare-matrix.outputs.matrix != '' }}

        # 开启矩阵策略，GitHub 会为数组里的每个值单独开一台机器跑
        strategy:
            fail-fast: false # 即使某个镜像构建失败，其他镜像继续构建
            matrix:
                target: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

        # 关键权限：允许 Actions 往你的 GitHub Packages 写入镜像
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # 登录到 GHCR
            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 登录到阿里云 ACR
            - name: Log in to ACR
              uses: docker/login-action@v3
              with:
                  registry: ${{ secrets.ALIYUN_REGISTRY }}
                  username: ${{ secrets.ALIYUN_REGISTRY_USER }}
                  password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            # 自动提取 Metadata (生成标签和注释)
            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  # 最终镜像名：ghcr.io/用户名/镜像名
                  images: |
                      ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
                      ${{ secrets.ALIYUN_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,format=short

            # 执行真正的构建和推送
            - name: Build and push OCI image
              uses: docker/build-push-action@v5
              with:
                  context: ./oci-image/${{ matrix.target }}
                  file: ./oci-image/${{ matrix.target }}/Dockerfile
                  # 安全规范：如果是 PR，只测试构建（干跑），不真正推送到仓库；只有 push 到 main 才推送
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
