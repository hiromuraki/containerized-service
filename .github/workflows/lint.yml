name: Validate Cloud-Init Config

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            # 1. 签出代码
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. 安装 cloud-init 工具
            - name: Install cloud-init
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cloud-init

            # 3. 使用 cloud-init schema 验证合法性
            - name: Validate cloud-config schema
              run: |
                  if [ ! -d "./cloud-init" ]; then
                      echo "Error: Directory ./cloud-init does not exist."
                      exit 1
                  fi

                  success=true
                  for file in ./cloud-init/*; do
                      if [ -f "$file" ]; then
                      echo "------------------------------------------------"
                      echo "Checking: $file"
                      
                      # 运行验证
                      if ! cloud-init schema --config-file "$file"; then
                          echo "❌ Validation failed for $file"
                          success=false
                      else
                          echo "✅ $file is valid"
                      fi
                      fi
                  done

                  if [ "$success" = false ]; then
                      exit 1
                  fi
