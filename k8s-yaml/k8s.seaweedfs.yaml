---
apiVersion: v1
kind: Secret
metadata:
    name: seaweedfs-s3-config
type: Opaque
stringData:
    s3.json: |-
        {
          "identities": [
            {
              "name": "admin",
              "credentials": [
                {
                  "accessKey": "admin_access_key",
                  "secretKey": "admin_secret_key"
                }
              ],
              "actions": ["Admin", "Read", "Write", "List", "Tagging"]
            }
          ]
        }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: seaweedfs-master-data
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: seaweedfs-volume-data
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: seaweedfs-filer-data
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
    name: seaweedfs
    labels:
        app: seaweedfs
spec:
    restartPolicy: Always
    containers:
        # 1. Master 主控
        - name: master
          image: ghcr.io/hiromuraki/containerized-service/seaweedfs:latest
          args: ["master"]
          ports:
              - containerPort: 9333
                hostPort: 9333
                hostIP: 127.0.0.1
          volumeMounts:
              - name: master-data
                mountPath: /data

        # 2. Volume 存储节点
        - name: volume
          image: ghcr.io/hiromuraki/containerized-service/seaweedfs:latest
          args: ["volume", "-mserver=localhost:9333", "-port=8080", "-ip=localhost"]
          ports:
              - containerPort: 8080
          volumeMounts:
              - name: volume-data
                mountPath: /data

        # 3. Filer (元数据用嵌入式 LevelDB，存于 /data)
        - name: filer
          image: ghcr.io/hiromuraki/containerized-service/seaweedfs:latest
          args: ["filer", "-master=localhost:9333", "-defaultStoreDir=/data"]
          ports:
              - containerPort: 8888
                hostPort: 8888
                hostIP: 127.0.0.1
          volumeMounts:
              - name: filer-data
                mountPath: /data

        # 4. S3 网关
        - name: s3
          image: ghcr.io/hiromuraki/containerized-service/seaweedfs:latest
          args:
              [
                  "s3",
                  "-filer=localhost:8888",
                  "-ip.bind=0.0.0.0",
                  "-port=8333",
                  "-config=/etc/seaweedfs/s3.json",
              ]
          ports:
              - containerPort: 8333
                hostPort: 8333
                hostIP: 127.0.0.1
          volumeMounts:
              - name: s3-config
                mountPath: /etc/seaweedfs/s3.json
                subPath: s3.json
                readOnly: true

    volumes:
        - name: master-data
          persistentVolumeClaim:
              claimName: seaweedfs-master-data
        - name: volume-data
          persistentVolumeClaim:
              claimName: seaweedfs-volume-data
        - name: filer-data
          persistentVolumeClaim:
              claimName: seaweedfs-filer-data
        - name: s3-config
          secret:
              secretName: seaweedfs-s3-config
