apiVersion: v1
kind: Pod
metadata:
    name: vaultwarden
    labels:
        app: vaultwarden
spec:
    restartPolicy: Always
    containers:
        - name: vaultwarden
          image: docker.io/vaultwarden/server:latest
          env:
              - name: TZ
                value: "Asia/Shanghai"
              - name: DOMAIN
                value: "https://vw.daveny.top"
          volumeMounts:
              - name: vaultwarden-data
                mountPath: /data/
    volumes:
        - name: vaultwarden-data
          persistentVolumeClaim:
              claimName: vaultwarden-data
