apiVersion: v1
kind: Pod
metadata:
    name: forgejo
    labels:
        app: forgejo
spec:
    restartPolicy: Always
    containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:14
          ports:
              - containerPort: 22
              - containerPort: 3000
          env:
              - name: USER_UID
                value: "1000"
              - name: USER_GID
                value: "1000"
              - name: TZ
                value: "Asia/Shanghai"
          volumeMounts:
              - name: forgejo-data
                mountPath: /data
              - name: forgejo-config
                subPath: app.ini
                mountPath: /data/gitea/conf/app.ini
    volumes:
        - name: forgejo-data
          persistentVolumeClaim:
              claimName: forgejo-data
        - name: forgejo-config
          persistentVolumeClaim:
              claimName: forgejo-config